name: monitoramento

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitoramento}
      POSTGRES_USER: ${POSTGRES_USER:-monitoramento}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitoramento}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  beat:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    environment:
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
